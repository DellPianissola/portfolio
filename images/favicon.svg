  <ellipse cx="16" cy="13" rx="9" ry="8" fill="#e650dc"/>
  <!-- Saia -->
  <ellipse cx="16" cy="20" rx="8" ry="2.2" fill="#e650dc"/>
  <!-- Tentáculos -->
  <g stroke="#e650dc" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M10 21 C8 24, 9 27, 10.5 29"/>
    <path d="M13.5 22 C12 25, 13 28, 14 30"/>
    <path d="M18.5 22 C20 25, 19 28, 18 30"/>
    <path d="M22 21 C24 24, 23 27, 21.5 29"/>
  </g>
  <!-- Brilho interno -->
  <ellipse cx="13" cy="10" rx="3.5" ry="2.5" fill="white" opacity="0.2"/>
</svg>
